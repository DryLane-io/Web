<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zao — The Dry Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0c0d12;
            color: rgba(230, 239, 255, 0.9);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 48px 24px 80px;
        }

        .wrap { max-width: 1100px; margin: 0 auto; }

        a.back {
            color: rgba(160, 170, 200, 0.7);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        a.back:hover { color: #fff; }

        h1 {
            color: #ffffff;
            font-size: 2.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 18px 0 6px;
            text-shadow: 0 0 20px rgba(106, 168, 254, 0.35);
        }

        .tagline {
            color: rgba(224, 232, 246, 0.92);
            font-size: 1.05rem;
            letter-spacing: 2px;
            margin-bottom: 36px;
        }

        .section-label {
            color: rgba(200, 210, 230, 0.85);
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 40px 0 14px;
        }

        /* Terminal-style log panel — plain (uncolored), light text. */
        .logs {
            background: #07080c;
            border: 1px solid rgba(106, 168, 254, 0.18);
            border-radius: 8px;
            padding: 18px 20px;
            font-family: 'Cascadia Code', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.92rem;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(224, 232, 246, 0.92);
            overflow-x: auto;
            white-space: pre;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <a class="back" href="index.html">&larr; Drylane.io</a>

        <h1>Zao</h1>
        <div class="tagline">Zeroes And Ones &mdash; blit-fast serializer with tiered codegen, up to ~67 GB/s memcpy-tier.</div>

        <div class="section-label">Throughput benchmark &middot; samples/Example2</div>
        <pre class="logs" id="run-log">loading…</pre>
    </div>

    <script>
        // Pull the real harness output (captured from samples/Example2) as plain text.
        // textContent escapes it — no markup trusted from the log.
        fetch('logs/zao-example.txt')
            .then(r => r.ok ? r.text() : Promise.reject(r.status))
            .then(txt => { document.getElementById('run-log').textContent = txt.replace(/\r/g, ''); })
            .catch(() => { document.getElementById('run-log').textContent = 'run log unavailable'; });
    </script>
</body>
</html>
